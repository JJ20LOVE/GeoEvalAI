openapi: 3.0.1
info:
  title: 默认模块
  description: ''
  version: 1.0.0
tags:
  - name: user
  - name: student
  - name: class
  - name: answersheet
  - name: exam
  - name: xueqing
  - name: flask
  - name: wrongbook
  - name: recommendation
paths:
  /user/signup:
    post:
      summary: 注册
      deprecated: false
      description: ''
      tags:
        - user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 名称
                email:
                  type: string
                password:
                  type: string
                re_password:
                  type: string
              required:
                - name
                - email
                - password
                - re_password
            example:
              name: zhanGsan
              email: 111@dnidd.com
              password: '1233321311'
              re_password: '1233321311'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                required:
                  - code
                  - msg
          headers: {}
      security:
        - bearer: []
  /user/changePass:
    put:
      summary: 修改密码
      deprecated: false
      description: ''
      tags:
        - user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                old_pass:
                  type: string
                new_pass:
                  type: string
              required:
                - username
                - old_pass
                - new_pass
            example:
              username: test
              old_pass: '123456'
              new_pass: '654321'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                required:
                  - code
                  - msg
              example:
                code: 200
                msg: success
          headers: {}
      security:
        - bearer: []
  /user/login:
    post:
      summary: 登录
      deprecated: false
      description: ''
      tags:
        - user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              username: test
              password: '123456'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  token:
                    type: string
                required:
                  - code
                  - msg
                  - token
          headers: {}
      security:
        - bearer: []
  /student/getAllStudent:
    get:
      summary: 获取学生列表
      deprecated: false
      description: ''
      tags:
        - student
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 200
                data:
                  - StudentID: '10225101537'
                    StudentName: luzhufeng
                msg: success
      security:
        - bearer: []
  /student/getStudentByClass:
    get:
      summary: 获取每个班级学生列表
      deprecated: false
      description: ''
      tags:
        - student
      parameters:
        - name: id
          in: query
          description: ID 编号
          required: false
          example: '2'
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        student_id:
                          type: string
                        student_name:
                          type: string
                        class_id:
                          type: integer
                  msg:
                    type: string
                required:
                  - code
                  - data
                  - msg
              example:
                code: 200
                data:
                  - id: 1
                    student_id: '10225101537'
                    student_name: luzhufeng
                    class_id: 2
                msg: success
          headers: {}
      security:
        - bearer: []
  /student/getStudentInfo:
    get:
      summary: 获取学生信息
      deprecated: false
      description: ''
      tags:
        - student
      parameters:
        - name: id
          in: query
          description: ID 编号
          required: true
          example: '1'
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 200
                data:
                  id: 1
                  student_id: '10225101537'
                  student_name: luzhufeng
                  class_name: T001
                  avg_grade: 100
                  max_grade: 100
                  min_grade: 100
                  History:
                    - id: 1
                      title: 2024高等数学
                      date: '2024-09-15T00:00:00+08:00'
                      total_grade: 100
                      comment: tql
                msg: success
          headers: {}
      security:
        - bearer: []
  /student/addStudent:
    post:
      summary: 添加学生
      deprecated: false
      description: ''
      tags:
        - student
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              class_id: 1
              student_id: '10225101536'
              student_name: lzk
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                '1':
                  summary: 异常示例
                  value:
                    code: 501
                    msg: student already exists
                '2':
                  summary: 成功示例
                  value:
                    code: 200
                    msg: success
          headers: {}
      security:
        - bearer: []
  /student/updateStudent:
    put:
      summary: 更新学生信息
      deprecated: false
      description: ''
      tags:
        - student
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              id: 1
              student_id: '10225101537'
              student_name: luzhufeng
              class_id: 2
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 200
                msg: success
          headers: {}
      security:
        - bearer: []
  /student/deleteStudent:
    delete:
      summary: 删除学生
      deprecated: false
      description: ''
      tags:
        - student
      parameters:
        - name: id
          in: query
          description: ID 编号
          required: true
          example: '1'
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 505
                msg: you can't delete a student with answer sheets
          headers: {}
      security:
        - bearer: []
  /class/getAllClass:
    get:
      summary: 获取班级列表
      deprecated: false
      description: ''
      tags:
        - class
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 200
                data:
                  - class_id: 1
                    class_name: T000
                msg: success
          headers: {}
      security:
        - bearer: []
  /class/addClass:
    post:
      summary: 添加班级
      deprecated: false
      description: ''
      tags:
        - class
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                class_name:
                  type: string
              required:
                - class_name
            example:
              class_name: T001
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                required:
                  - code
                  - msg
              examples:
                '1':
                  summary: 异常示例
                  value:
                    code: 503
                    msg: class already exists
                '2':
                  summary: 成功示例
                  value:
                    code: 200
                    msg: success
          headers: {}
      security:
        - bearer: []
  /class/updateClass:
    put:
      summary: 更新班级信息
      deprecated: false
      description: ''
      tags:
        - class
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              class_id: 2
              class_name: T001
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 200
                msg: success
          headers: {}
      security:
        - bearer: []
  /class/deleteClass:
    delete:
      summary: 删除班级
      deprecated: false
      description: ''
      tags:
        - class
      parameters:
        - name: class_id
          in: query
          description: ID 编号
          required: true
          example: '1'
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                code: 504
                msg: you can't delete a class with students
          headers: {}
      security:
        - bearer: []
