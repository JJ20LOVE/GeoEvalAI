                  - msg
              example:
                code: 200
                data:
                  basic_info:
                    id: 76
                    student_id: 2
                    exam_id: 1
                    total_grade: 0
                    is_eva: false
                    student_name: lzk
                  questions:
                    - question_id: 1
                      ocr_result: >-
                        ①为诸多生物提供栖息地，保护生物多样性； ②作为我国最广阔、年轻的湿地，为研究人员提供宝贵的研究对象；
                        ③黄河泥沙的淤积地，可作为后备耕地
                      point: 0
                      comment: ''
                    - question_id: 2
                      ocr_result: >-
                        ①当地廉价劳动力充足，有利于降低生产成本；②政府扶持该产业发展，有降低税收等优惠政策；③
                        区域靠近高科技园区智力型劳动力充足；
                      point: 0
                      comment: ''
                    - question_id: 3
                      ocr_result: ''
                      point: 0
                      comment: ''
                    - question_id: 4
                      ocr_result: >-
                        ①由于橄榄种植区最北为闽江中下游，纬度低，热量充足，
                        且多生长于低丘缓坡，推测其喜热、怕涝②由于其分布在季风区、推测其喜湿。
                      point: 0
                      comment: ''
                    - question_id: 5
                      ocr_result: ①位于冬季风的迎风坡，受冷空气影响较大，气湿较低； ②冬季太阳直射南半球，北半球大阳高度小，日照时间短，气温低。
                      point: 0
                      comment: ''
                    - question_id: 6
                      ocr_result: >-
                        ①制约橄榄树分布区扩展的因素之一为冬季的冻害威胁。 冬季水库蓄水位高，水量大，因为水的比热容大，
                        温度相对较高，导致库区周边地区气温降辐小，更温暖，满足橄榄需求；② 水库蓄水导致空气湿度增大，符合橄榄习性
                      point: 0
                      comment: ''
                    - question_id: 7
                      ocr_result: >-
                        ①延长产业链。制成保健品。增加附加值；②加大宣传力度， 形成品牌效应；③加强基础设施建设，尤其是交通。
                        打造生态旅游；④改进冷藏保鲜技术，扩大产品市场，增加辐射半径。
                      point: 0
                      comment: ''
                    - question_id: 8
                      ocr_result: >-
                        答：距今约18ka
                        ,理由：在距今约18ka期间，沉积物为钙质粉砂，说明该地质历史期间，沉积环境为深水，以堆积作用为主，符合古湖特征。
                      point: 0
                      comment: ''
                    - question_id: 9
                      ocr_result: >-
                        答：①地壳抬开，湖盆上升，外力作用以侵蚀为主，由不整合面可看出。②气候干旱，降水减少，蒸发旺盛，湖泊来水量减少，水位下降乃至逐渐千涸。
                      point: 0
                      comment: ''
                    - question_id: 10
                      ocr_result: >-
                        答：特征：干湿季交替交化、无明显周期，且不稳定依据：①沉积物呈现深水堆积物一千旱环境产物(石膏)重复沉积序列，说明沉积环境干湿交替交化。
                        推测降水量变化剧烈；②各沉积层厚度不一，于、 湿层序列不一致，说明降水不稳定。
                      point: 0
                      comment: ''
                  pic_urls:
                    - >-
