server:
  port: 8080

logging:
  level:
    root: INFO
    com.geollm: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.mybatis: INFO
    com.baomidou.mybatisplus: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

app:
  jwtKey: "your key"

spring:
  main:
    # 避免 Milvus 尚未 ready 时在容器启动阶段强行建连导致启动失败
   lazy-initialization: true
  datasource:
    url: "jdbc:mysql://localhost:3306/geollm?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
    username: root
    password: dinghuaye521
  ai:
    openai:
      # DeepSeek 兼容 OpenAI API
      api-key: ${DEEPSEEK_API_KEY:${ai.deepseek.apiKey}}
      base-url: ${DEEPSEEK_BASE_URL:${ai.deepseek.baseUrl}}
      chat:
        options:
          model: ${AI_CHAT_MODEL:${ai.model}}
          temperature: ${AI_TEMPERATURE:${ai.temperature}}
      embedding:
        options:
          # 需你的提供方支持 embeddings；如不支持可换成其它 embedding 服务
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:${milvus.host}}
          port: ${MILVUS_PORT:${milvus.port}}
        collectionName: ${MILVUS_COLLECTION:${milvus.collection}}
        embeddingDimension: ${MILVUS_DIMENSION:${milvus.dimension}}
        initializeSchema: true
        indexType: IVF_FLAT
        metricType: COSINE

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: "http://127.0.0.1:9000"
  accessKey: "minioadmin"
  secretKey: "minioadmin"
  bucket: "answersheet"

ocr:
  provider: "aliyun"
  timeoutSeconds: 30
  aliyun:
    appCode: "yourcode"
    host: "gjbsb.market.alicloudapi.com"
    path: "/ocrservice/advanced"

ai:
  provider: "deepseek"
  deepseek:
    apiKey: ""
    baseUrl: "https://api.deepseek.com"
  model: "deepseek-chat"
  maxTokens: 2000
  temperature: 0.7

eva:
  baseUrl: "https://zer0.top/flask"
  timeoutSeconds: 60

milvus:
  host: "127.0.0.1"
  port: 19530
  collection: "geollm_question_bank"
  dimension: 1024



